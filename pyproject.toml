[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "oer-overpotential-calculator"
version = "0.1.0"
description = "Calculator for OER overpotential"
requires-python = ">=3.9"
dependencies = [
    "matplotlib",
    "pandas",
    "torch-dftd",
    "ase",
    "pyqt5",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"oer_overpotential_calculator" = ["data/*.yaml"]
